version: 2

models:
  - name: bronze_orders
    description: Raw-to-typed bronze orders table from seed input.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['PLACED', 'SHIPPED', 'CANCELLED']
      - name: amount
        tests:
          - not_null
